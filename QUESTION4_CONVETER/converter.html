<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="glass rounded-3xl shadow-2xl w-full max-w-md p-8 text-white">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-2">
        <i class="fa-solid fa-coins text-4xl"></i>
        <h1 class="text-3xl font-bold tracking-tight">Currency Converter</h1>
      </div>
      <p class="text-white/70">Simple & Modern</p>
    </div>

    <div class="space-y-6">

      <!-- Amount Input -->
      <div>
        <label class="block text-sm font-medium text-white/80 mb-1.5">Enter Amount</label>
        <div class="relative">
          <span class="absolute left-5 top-1/2 -translate-y-1/2 text-white/70 font-semibold">FRW</span>
          <input 
            type="number" 
            id="amount"
            placeholder="1000"
            class="w-full bg-white/10 border border-white/30 rounded-2xl py-4 pl-20 pr-5 text-2xl font-medium focus:outline-none focus:border-white/60 transition-all placeholder-white/40">
        </div>
      </div>

      <!-- Select Currency -->
      <div>
        <label class="block text-sm font-medium text-white/80 mb-1.5">Select Currency</label>
        <div class="relative">
          <select id="toCurrency" 
            class="w-full bg-white/10 border border-white/30 rounded-2xl py-4 px-5 text-white text-lg focus:outline-none focus:border-white/60 appearance-none">
            <option value="USD">🇺🇸 USD - US Dollar</option>
            <option value="EUR">🇪🇺 EUR - Euro</option>
            <option value="GBP">🇬🇧 GBP - British Pound</option>
            <option value="KES">🇰🇪 KES - Kenyan Shilling</option>
            <option value="TZS">🇹🇿 TZS - Tanzanian Shilling</option>
          </select>
          <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-white/60 pointer-events-none"></i>
        </div>
      </div>

      <!-- Manual Rate Input -->
      <div>
        <label class="block text-sm font-medium text-white/80 mb-1.5 flex items-center gap-2">
          <span>Exchange Rate</span>
          <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full">1 FRW = ?</span>
        </label>
        <div class="relative">
          <input 
            type="number" 
            id="rate"
            step="0.000001"
            placeholder="0.00076"
            class="w-full bg-white/10 border border-white/30 rounded-2xl py-4 px-5 text-2xl font-medium focus:outline-none focus:border-white/60 transition-all">
          <span class="absolute right-5 top-1/2 -translate-y-1/2 text-white/60 font-medium" id="rateLabel">USD</span>
        </div>
        <p class="text-xs text-white/50 mt-1">Enter the rate manually (e.g. 0.00076 for USD)</p>
      </div>

      <!-- Convert Button -->
      <button 
        onclick="convertCurrency()"
        class="w-full bg-white hover:bg-white/90 text-indigo-700 font-semibold py-4 rounded-2xl text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        CONVERT
      </button>

      <!-- Result -->
      <div id="result" class="hidden bg-white/10 border border-white/20 rounded-2xl p-6 text-center">
        <p class="text-white/70 text-sm mb-2">Converted Amount</p>
        <p id="convertedAmount" class="text-5xl font-bold tracking-tighter text-white"></p>
        <p id="targetCurrency" class="text-2xl font-medium text-white/90 mt-1"></p>
      </div>

    </div>

    <p class="text-center text-white/40 text-xs mt-10">Project 4 • Modern Currency Converter</p>
  </div>

  <script>
    function convertCurrency() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const rate = parseFloat(document.getElementById('rate').value) || 0;
      const toCurrency = document.getElementById('toCurrency').value;

      if (amount <= 0 || rate <= 0) {
        alert("Please enter a valid amount and exchange rate.");
        return;
      }

      const result = amount * rate;

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('convertedAmount').textContent = result.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 4
      });
      document.getElementById('targetCurrency').textContent = toCurrency;
    }

    // Update rate label when currency changes
    document.getElementById('toCurrency').addEventListener('change', function() {
      document.getElementById('rateLabel').textContent = this.value;
    });
  </script>
</body>
</html>
